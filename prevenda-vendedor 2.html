<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Pré-Venda · Magalu</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --blue: #0e1f5b;
    --blue2: #1a3080;
    --yellow: #FFE000;
    --orange: #ff6b00;
    --bg: #f0f2f8;
    --white: #ffffff;
    --text: #0f172a;
    --muted: #64748b;
    --border: #e2e8f0;
    --success: #16a34a;
    --radius: 18px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* HERO HEADER */
  .hero {
    width: 100%;
    background: linear-gradient(135deg, var(--blue) 0%, var(--blue2) 60%, #2a4fa8 100%);
    padding: 36px 24px 80px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .hero::before {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 220px; height: 220px;
    background: rgba(255,224,0,0.08);
    border-radius: 50%;
  }

  .hero::after {
    content: '';
    position: absolute;
    bottom: -40px; left: -40px;
    width: 150px; height: 150px;
    background: rgba(255,107,0,0.07);
    border-radius: 50%;
  }

  .hero-logo {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
  }

  .hero-icon {
    width: 42px; height: 42px;
    background: var(--yellow);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    box-shadow: 0 4px 16px rgba(255,224,0,0.3);
  }

  .hero-brand {
    font-weight: 800;
    font-size: 1.15rem;
    color: #fff;
    letter-spacing: -0.3px;
  }

  .hero-brand small {
    display: block;
    font-size: 0.65rem;
    font-weight: 500;
    color: var(--yellow);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .hero h1 {
    font-size: 1.7rem;
    font-weight: 800;
    color: #fff;
    line-height: 1.2;
    margin-bottom: 8px;
  }

  .hero h1 span { color: var(--yellow); }

  .hero p {
    color: rgba(255,255,255,0.65);
    font-size: 0.9rem;
    max-width: 320px;
    margin: 0 auto;
  }

  /* CARD */
  .card {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: 0 8px 40px rgba(14,31,91,0.12);
    width: 100%;
    max-width: 480px;
    margin: -44px auto 32px;
    padding: 32px 28px;
    position: relative;
    z-index: 2;
  }

  .card-title {
    font-size: 1rem;
    font-weight: 800;
    color: var(--blue);
    margin-bottom: 22px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .field { margin-bottom: 16px; }

  .field label {
    display: block;
    font-size: 0.72rem;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 7px;
  }

  .field label .req { color: var(--orange); margin-left: 2px; }

  .field input,
  .field select {
    width: 100%;
    padding: 13px 16px;
    border: 2px solid var(--border);
    border-radius: 12px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.92rem;
    color: var(--text);
    background: #f8fafc;
    transition: all 0.2s;
    outline: none;
    -webkit-appearance: none;
  }

  .field input:focus,
  .field select:focus {
    border-color: var(--blue);
    background: #fff;
    box-shadow: 0 0 0 4px rgba(14,31,91,0.07);
  }

  .field input.error { border-color: #ef4444; background: #fff5f5; }

  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .date-hint {
    font-size: 0.72rem;
    color: var(--muted);
    margin-top: 5px;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  /* DIVIDER */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 20px 0;
    position: relative;
  }

  .divider-label {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    background: var(--white);
    padding: 0 10px;
    font-size: 0.7rem;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* SUBMIT */
  .btn-submit {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--blue) 0%, var(--blue2) 100%);
    color: #fff;
    border: none;
    border-radius: 14px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1rem;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    box-shadow: 0 4px 20px rgba(14,31,91,0.25);
  }

  .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(14,31,91,0.32); }
  .btn-submit:active { transform: translateY(0); }
  .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  /* SUCCESS */
  .success-screen {
    display: none;
    text-align: center;
    padding: 12px 0;
  }

  .success-icon {
    width: 72px; height: 72px;
    background: linear-gradient(135deg, #16a34a, #22c55e);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 2rem;
    margin: 0 auto 18px;
    box-shadow: 0 8px 24px rgba(22,163,74,0.3);
    animation: popIn 0.5s cubic-bezier(.34,1.56,.64,1);
  }

  @keyframes popIn {
    from { transform: scale(0); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .success-title {
    font-size: 1.35rem;
    font-weight: 800;
    color: var(--text);
    margin-bottom: 8px;
  }

  .success-sub {
    color: var(--muted);
    font-size: 0.88rem;
    line-height: 1.5;
    margin-bottom: 24px;
  }

  .summary-box {
    background: #f8fafc;
    border-radius: 12px;
    padding: 16px;
    text-align: left;
    margin-bottom: 20px;
  }

  .summary-row {
    display: flex;
    justify-content: space-between;
    font-size: 0.82rem;
    padding: 5px 0;
    border-bottom: 1px solid var(--border);
  }

  .summary-row:last-child { border: none; }
  .summary-row span:first-child { color: var(--muted); }
  .summary-row span:last-child { font-weight: 700; color: var(--text); }

  .btn-new {
    width: 100%;
    padding: 14px;
    background: var(--yellow);
    color: var(--blue);
    border: none;
    border-radius: 14px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.92rem;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.18s;
  }

  .btn-new:hover { background: #e6c900; transform: translateY(-1px); }

  /* LOADING SPINNER */
  .spinner {
    width: 20px; height: 20px;
    border: 3px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .footer {
    padding: 20px;
    text-align: center;
    color: var(--muted);
    font-size: 0.75rem;
  }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-logo">
    <div class="hero-icon">🛍️</div>
    <div class="hero-brand">
      Magalu
      <small>Mobile Vendas</small>
    </div>
  </div>
  <h1>Registrar <span>Pré-Venda</span></h1>
  <p>Preencha os dados do cliente e do pagamento recebido</p>
</div>

<div class="card">
  <!-- FORM -->
  <div id="form-area">
    <div class="card-title">📋 Dados da Pré-Venda</div>

    <div class="field">
      <label>Seu nome (vendedor) <span class="req">*</span></label>
      <input type="text" id="f-vendedor" placeholder="Ex: João Silva">
    </div>

    <div class="field">
      <label>CPF do cliente <span class="req">*</span></label>
      <input type="text" id="f-cpf" placeholder="000.000.000-00" maxlength="14" oninput="maskCPF(this)" inputmode="numeric">
    </div>

    <div class="field-row">
      <div class="field">
        <label>Valor (R$) <span class="req">*</span></label>
        <input type="number" id="f-valor" placeholder="0,00" step="0.01" inputmode="decimal">
      </div>
      <div class="field">
        <label>Forma de pgto <span class="req">*</span></label>
        <select id="f-pagamento">
          <option value="">Selecione...</option>
          <option>Cartão de Crédito</option>
          <option>Cartão de Débito</option>
          <option>Pix</option>
          <option>Boleto</option>
          <option>Dinheiro</option>
          <option>Crediário Magalu</option>
        </select>
      </div>
    </div>

    <div class="divider"><span class="divider-label">Datas</span></div>

    <div class="field-row">
      <div class="field">
        <label>Data do pagamento <span class="req">*</span></label>
        <input type="date" id="f-data-pag">
        <div class="date-hint">📅 Hoje ou anterior</div>
      </div>
      <div class="field">
        <label>Data de lançamento <span class="req">*</span></label>
        <input type="date" id="f-data-lanc">
        <div class="date-hint">⏳ Data futura</div>
      </div>
    </div>

    <div class="divider"><span class="divider-label">Produto</span></div>

    <div class="field">
      <label>Produto / Descrição</label>
      <input type="text" id="f-produto" placeholder="Ex: TV 55'', Geladeira Brastemp...">
    </div>

    <div class="field">
      <label>Observação</label>
      <input type="text" id="f-obs" placeholder="Informação adicional...">
    </div>

    <button class="btn-submit" onclick="submitForm()">
      <span id="btn-text">✅ Enviar Pré-Venda</span>
      <div class="spinner" id="spinner"></div>
    </button>
  </div>

  <!-- SUCCESS -->
  <div class="success-screen" id="success-area">
    <div class="success-icon">✅</div>
    <div class="success-title">Pré-Venda Registrada!</div>
    <div class="success-sub">Os dados foram enviados e já aparecem no sistema da equipe.</div>
    <div class="summary-box" id="summary-box"></div>
    <button class="btn-new" onclick="resetForm()">➕ Registrar outra pré-venda</button>
  </div>
</div>

<div class="footer">
  Magazine Luiza · Sistema Mobile Vendas · 2025
</div>

<script>
  const STORAGE_KEY = 'magalu-presales';

  const today = new Date().toISOString().split('T')[0];
  document.getElementById('f-data-pag').value = today;

  // Set min date for lançamento = tomorrow
  const tomorrow = new Date(); tomorrow.setDate(tomorrow.getDate()+1);
  document.getElementById('f-data-lanc').min = tomorrow.toISOString().split('T')[0];

  function maskCPF(input) {
    let v = input.value.replace(/\D/g,'').slice(0,11);
    v = v.replace(/(\d{3})(\d)/,'$1.$2').replace(/(\d{3})(\d)/,'$1.$2').replace(/(\d{3})(\d{1,2})$/,'$1-$2');
    input.value = v;
  }

  function formatDate(s) {
    if (!s) return '—';
    const [y,m,d] = s.split('-'); return `${d}/${m}/${y}`;
  }

  function formatCurrency(v) {
    return 'R$ ' + parseFloat(v).toLocaleString('pt-BR',{minimumFractionDigits:2});
  }

  function setError(id, on) {
    document.getElementById(id).classList.toggle('error', on);
  }

  function submitForm() {
    const vendedor  = document.getElementById('f-vendedor').value.trim();
    const cpf       = document.getElementById('f-cpf').value.trim();
    const valor     = parseFloat(document.getElementById('f-valor').value);
    const pagamento = document.getElementById('f-pagamento').value;
    const dataPag   = document.getElementById('f-data-pag').value;
    const dataLanc  = document.getElementById('f-data-lanc').value;
    const produto   = document.getElementById('f-produto').value.trim();
    const obs       = document.getElementById('f-obs').value.trim();

    // Validation
    let ok = true;
    [['f-vendedor', !vendedor], ['f-cpf', cpf.length < 14], ['f-valor', isNaN(valor)||valor<=0],
     ['f-pagamento', !pagamento], ['f-data-pag', !dataPag], ['f-data-lanc', !dataLanc]].forEach(([id, err]) => {
      setError(id, err); if (err) ok = false;
    });

    if (!ok) { shakeBtn(); return; }
    if (dataLanc <= dataPag) {
      setError('f-data-lanc', true);
      alert('A data de lançamento deve ser após a data do pagamento.');
      return;
    }

    // Show loading
    document.getElementById('btn-text').textContent = 'Enviando...';
    document.getElementById('spinner').style.display = 'block';
    document.querySelector('.btn-submit').disabled = true;

    // Build record
    const record = {
      id: Date.now(),
      vendedor, cpf, valor, pagamento, dataPag, dataLanc,
      produto, obs,
      status: 'pendente',
      fileName: null, fileData: null,
      origem: 'formulario-vendedor'
    };

    // Save to localStorage (shared key with main system)
    setTimeout(() => {
      try {
        const existing = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        existing.push(record);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(existing));
        showSuccess(record);
      } catch(e) {
        alert('Erro ao salvar. Tente novamente.');
        resetBtn();
      }
    }, 1200);
  }

  function shakeBtn() {
    const btn = document.querySelector('.btn-submit');
    btn.style.animation = 'shake 0.4s ease';
    setTimeout(() => btn.style.animation = '', 400);
  }

  function resetBtn() {
    document.getElementById('btn-text').textContent = '✅ Enviar Pré-Venda';
    document.getElementById('spinner').style.display = 'none';
    document.querySelector('.btn-submit').disabled = false;
  }

  function showSuccess(r) {
    document.getElementById('form-area').style.display = 'none';
    const s = document.getElementById('success-area');
    s.style.display = 'block';

    document.getElementById('summary-box').innerHTML = [
      ['Vendedor', r.vendedor],
      ['CPF', r.cpf],
      ['Valor', 'R$ ' + r.valor.toFixed(2)],
      ['Pagamento', r.pagamento],
      ['Pago em', formatDate(r.dataPag)],
      ['Lançamento', formatDate(r.dataLanc)],
      ['Produto', r.produto || '—'],
    ].map(([k,v]) => `<div class="summary-row"><span>${k}</span><span>${v}</span></div>`).join('');
  }

  function resetForm() {
    document.getElementById('form-area').style.display = 'block';
    document.getElementById('success-area').style.display = 'none';
    ['f-vendedor','f-cpf','f-valor','f-pagamento','f-produto','f-obs'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('f-data-pag').value = today;
    document.getElementById('f-data-lanc').value = '';
    resetBtn();
  }
</script>

<style>
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%,60% { transform: translateX(-6px); }
    40%,80% { transform: translateX(6px); }
  }
</style>
</body>
</html>
